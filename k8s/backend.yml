apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deploy
  labels:
    app: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 804867352391.dkr.ecr.us-east-1.amazonaws.com/dev/backend:latest
          ports:
          - containerPort: 8500
      imagePullSecrets:
      - name: myregistrykey
          